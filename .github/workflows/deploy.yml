name: deploy.yml

on:
  push:
    branches:
      - main

jobs:
  CI:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python source
        run: |
          python -m compileall app.py config.py models.py cloud_services.py incident_utils

  CD:
    runs-on: ubuntu-latest
    needs: CI

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Connected to EC2"

            cd ~/incident-management-system

            git pull origin main

            python3 -m venv venv || true
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            sudo tee /etc/systemd/system/incident-system.service > /dev/null <<'SERVICE'
            [Unit]
            Description=Cloud Incident Control Centre
            After=network.target

            [Service]
            User=ec2-user
            Group=ec2-user
            WorkingDirectory=/home/ec2-user/incident-management-system
            EnvironmentFile=-/home/ec2-user/incident-management-system/.env
            Environment=PORT=8000
            Environment=FLASK_DEBUG=false
            ExecStart=/home/ec2-user/incident-management-system/venv/bin/gunicorn --workers 1 --timeout 60 --bind 0.0.0.0:8000 app:app
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            SERVICE

            sudo systemctl daemon-reload
            sudo systemctl enable incident-system
            sudo systemctl restart incident-system
            sudo systemctl status incident-system --no-pager

            echo "Port check:"
            ss -ltnp | grep 8000 || true
