<!DOCTYPE html>
<html>
<head>
    <title>Update Incident</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>Update Incident</h2>

    <form method="POST">
        <label>Title</label>
        <input type="text" name="title" class="form-control" value="{{ incident['title'] }}">

        <label class="mt-3">Description</label>
        <textarea name="description" class="form-control">{{ incident['description'] }}</textarea>

        <!-- 🔥 PRIORITY CONTROL -->
        <label class="mt-3">Priority</label>
        <select name="priority" class="form-control">
            <option value="P1" {% if incident['priority']=='P1' %}selected{% endif %}>P1 (Critical)</option>
            <option value="P2" {% if incident['priority']=='P2' %}selected{% endif %}>P2 (High)</option>
            <option value="P3" {% if incident['priority']=='P3' %}selected{% endif %}>P3 (Medium)</option>
            <option value="P4" {% if incident['priority']=='P4' %}selected{% endif %}>P4 (Low)</option>
        </select>

        <label class="mt-3">Status</label>
        <select name="status" class="form-control">
            <option {% if incident['status']=='Open' %}selected{% endif %}>Open</option>
            <option {% if incident['status']=='In Progress' %}selected{% endif %}>In Progress</option>
            <option {% if incident['status']=='Resolved' %}selected{% endif %}>Resolved</option>
            <option {% if incident['status']=='Closed' %}selected{% endif %}>Closed</option>
        </select>

        <br>
        <button class="btn btn-success">Update</button>
        <a href="/" class="btn btn-secondary">Back</a>
    </form>
</div>

</body>
</html>
