<!DOCTYPE html>
<html>
<head>
    <title>Update Incident</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning text-dark">
            Update Incident
        </div>

        <div class="card-body">

            <form method="POST">

                <!-- Title -->
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text"
                           name="title"
                           value="{{ incident.title }}"
                           class="form-control"
                           required>
                </div>

                <!-- Description -->
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description"
                              class="form-control"
                              required>{{ incident.description }}</textarea>
                </div>

                <!-- Status -->
                <div class="mb-3">
                    <label class="form-label">Status</label>

                    <select name="status" class="form-select">

                        <option {% if incident.status == "Open" %}selected{% endif %}>Open</option>

                        <option {% if incident.status == "In Progress" %}selected{% endif %}>
                            In Progress
                        </option>

                        <option {% if incident.status == "Resolved" %}selected{% endif %}>
                            Resolved
                        </option>

                        <option {% if incident.status == "Closed" %}selected{% endif %}>
                            Closed
                        </option>

                    </select>
                </div>

                <!-- Buttons -->
                <button type="submit" class="btn btn-success">
                    Update Incident
                </button>

                <a href="/" class="btn btn-secondary">
                    Cancel / Back
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
