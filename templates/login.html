<!DOCTYPE html>
<html>
<head>
    <title>Login - Incident System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f4f7fb;">

<div class="container mt-5">
    <div class="row shadow-lg">

        <!-- LOGIN SIDE -->
        <div class="col-md-6 p-5 bg-white">
            <h3>Login</h3>
            <form method="POST">
                <input type="text" name="username" placeholder="Username" class="form-control mb-3">
                <input type="password" name="password" placeholder="Password" class="form-control mb-3">
                <button class="btn btn-primary w-100">Login</button>
            </form>
        </div>

        <!-- GUEST SIDE -->
        <div class="col-md-6 p-5 text-center text-white" style="background:#0d6efd;">
            <h3>Continue as Guest</h3>
            <p>No login required</p>
            <a href="/guest" class="btn btn-light">Enter as Guest</a>
        </div>

    </div>
</div>

</body>
</html>
